<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sophie Bluel - Page de connexion</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
      integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!--CSS local-->
    <link rel="stylesheet" href="../assets/css/style.css" />

    <!--JS local-->
    <script src="../js/pages/login.js" defer></script>
  </head>

  <body class="loginbody">
    <!--HEADER-->
    <header>
      <h1>Sophie Bluel <span>ARCHITECTE D'INTÉRIEUR</span></h1>
      <nav>
        <ul>
          <li><a href="index.html">projets</a></li>
          <li><a href="index.html#contact">contact</a></li>
          <li class="active" id="login-item"><a href="login.html">login</a></li>
          <li><img src="../assets/icons/instagram.png" alt="Instagram" /></li>
        </ul>
      </nav>
    </header>

    <!--MAIN-->

    <main class="login-container">
      <section>
        <h2>Log In</h2>

        <form id="loginForm" class="login-form">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required />

          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required />

          <button type="submit" class="login-btn">Se connecter</button>

          <p id="loginError" class="login-error">
            Erreur dans l’identifiant ou le mot de passe
          </p>
          <a href="#" class="login-forgot">Mot de passe oublié</a>
        </form>
      </section>
    </main>

    <!--FOOTER-->

    <footer class="footerlogin">
      <nav>
        <ul>
          <li>Mentions légales</li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
